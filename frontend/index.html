<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>AI Predictive Dialer</title>
  <link rel="stylesheet" href="/static/style.css"/>
</head>
<body>

<!-- ── Top Nav ── -->
<nav>
  <div class="nav-brand">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.14 13a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.05 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 21 17z"/></svg>
    <span>AI Predictive Dialer</span>
  </div>
  <div class="nav-right">
    <span id="esl-badge" class="badge-pill offline">● Connecting…</span>
    <span id="clock" class="nav-clock"></span>
  </div>
</nav>

<!-- ── Stats Bar ── -->
<div class="stats-bar" id="stats-bar" style="display:none">
  <div class="stat-pill">
    <span class="stat-label">Campaign</span>
    <span id="sb-name" class="stat-value campaign-name">—</span>
  </div>
  <div class="stat-pill">
    <span class="stat-label">Status</span>
    <span id="sb-status" class="stat-value">—</span>
  </div>
  <div class="divider"></div>
  <div class="stat-pill">
    <span class="stat-label">Total</span>
    <span id="sb-total" class="stat-value">0</span>
  </div>
  <div class="stat-pill">
    <span class="stat-label">Dialed</span>
    <span id="sb-dialed" class="stat-value">0</span>
  </div>
  <div class="stat-pill highlight-green">
    <span class="stat-label">Answered</span>
    <span id="sb-answered" class="stat-value">0</span>
  </div>
  <div class="stat-pill highlight-red">
    <span class="stat-label">Dropped</span>
    <span id="sb-dropped" class="stat-value">0</span>
  </div>
  <div class="stat-pill">
    <span class="stat-label">Machine</span>
    <span id="sb-machine" class="stat-value">0</span>
  </div>
  <div class="divider"></div>
  <div class="stat-pill">
    <span class="stat-label">Answer Rate</span>
    <span id="sb-ansrate" class="stat-value">—</span>
  </div>
  <div class="stat-pill">
    <span class="stat-label">Drop Rate</span>
    <span id="sb-droprate" class="stat-value">—</span>
  </div>
  <div class="progress-wrap">
    <div id="sb-progress" class="progress-bar"></div>
  </div>
</div>

<!-- ── Main Layout ── -->
<div class="layout">

  <!-- LEFT SIDEBAR -->
  <aside class="sidebar">

    <!-- Campaign -->
    <section class="card">
      <div class="card-header">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        Campaign
      </div>
      <div class="input-row">
        <input id="camp-name" type="text" placeholder="Campaign name…" class="input"/>
        <button class="btn btn-purple" onclick="createCampaign()">New</button>
      </div>
      <select id="camp-select" class="input" onchange="loadCampaign()">
        <option value="">— select —</option>
      </select>

      <div id="camp-controls" style="display:none">
        <label class="upload-btn">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></svg>
          Upload CSV
          <input type="file" accept=".csv" onchange="uploadContacts(event)"/>
        </label>
        <div class="btn-group">
          <button class="btn btn-green"  onclick="startCampaign()">▶ Start</button>
          <button class="btn btn-amber"  onclick="pauseCampaign()">⏸</button>
          <button class="btn btn-amber"  onclick="resumeCampaign()">▶</button>
          <button class="btn btn-red"    onclick="stopCampaign()">■ Stop</button>
          <button class="btn btn-reset"  onclick="resetCampaign()" title="Mark all contacts as un-dialed and reset stats">↺ Reset &amp; Redial</button>
        </div>
      </div>
    </section>

    <!-- Agents -->
    <section class="card" style="flex:1;overflow:hidden;display:flex;flex-direction:column">
      <div class="card-header">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Agents
      </div>
      <div class="input-row">
        <input id="agent-name" type="text" placeholder="Name" class="input"/>
        <input id="agent-ext"  type="text" placeholder="Ext" class="input" style="width:70px"/>
        <button class="btn btn-purple" onclick="addAgent()">Add</button>
      </div>
      <div class="agent-list" id="agent-list"></div>
    </section>

  </aside>

  <!-- RIGHT CONTENT -->
  <main class="content">

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" onclick="switchTab('active', this)">
        <span id="active-badge" class="tab-badge">0</span> Active Calls
      </button>
      <button class="tab" onclick="switchTab('history', this)">
        <span id="history-badge" class="tab-badge">0</span> Call History
      </button>
    </div>

    <!-- Active Calls Tab -->
    <div id="tab-active" class="tab-content active">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Phone</th><th>Name</th><th>Status</th><th>Agent</th>
              <th>Duration</th><th>AMD</th><th>Disposition</th>
            </tr>
          </thead>
          <tbody id="active-tbody"></tbody>
        </table>
        <div id="active-empty" class="empty-state">No active calls right now</div>
      </div>
    </div>

    <!-- Call History Tab -->
    <div id="tab-history" class="tab-content">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Phone</th><th>Name</th><th>Duration</th><th>Disposition</th>
              <th>Sentiment</th><th>Recording</th><th>AI Summary</th>
            </tr>
          </thead>
          <tbody id="history-tbody"></tbody>
        </table>
        <div id="history-empty" class="empty-state">No completed calls yet</div>
      </div>
    </div>

  </main>
</div>

<script src="/static/app.js"></script>
</body>
</html>
