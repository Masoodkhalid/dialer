<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Sign In — AI Predictive Dialer</title>
  <link rel="stylesheet" href="/static/style.css"/>
  <style>
    body { justify-content:center; align-items:center; }
  </style>
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-icon">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.14 13a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.05 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 21 17z"/>
        </svg>
      </div>
      <div class="login-title">AI Predictive Dialer</div>
      <div class="login-sub">Sign in to your account</div>
    </div>

    <form id="login-form">
      <div class="field">
        <label>Username</label>
        <input class="input" id="username" type="text" autocomplete="username" placeholder="Enter username" required/>
      </div>
      <div class="field">
        <label>Password</label>
        <input class="input" id="password" type="password" autocomplete="current-password" placeholder="Enter password" required/>
      </div>
      <button id="login-btn" class="login-btn" type="submit">Sign In →</button>
      <div id="err-box" class="err-box"></div>
    </form>

    <div style="text-align:center;margin-top:20px;font-size:11px;color:var(--muted)">
      AI Predictive Dialer · v1.0
    </div>
  </div>
</div>
<script src="/static/login.js"></script>
</body>
</html>
