<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Sign In — AI Predictive Dialer</title>
  <link rel="stylesheet" href="/static/style.css"/>
  <style>
    body { justify-content: center; align-items: center; }
    .login-wrap { display:flex; align-items:center; justify-content:center; flex:1; padding:20px; }
    .login-card {
      background:var(--surface); border:1px solid var(--border);
      border-radius:16px; padding:40px; width:100%; max-width:380px;
      box-shadow:0 24px 64px rgba(0,0,0,0.5);
    }
    .login-logo { text-align:center; margin-bottom:32px; }
    .login-icon {
      width:60px; height:60px; margin:0 auto 14px;
      background:linear-gradient(135deg,#7c3aed,#4f46e5);
      border-radius:16px; display:flex; align-items:center; justify-content:center;
    }
    .login-icon svg { color:#fff; }
    .login-title { font-size:22px; font-weight:700; color:var(--text); margin-bottom:4px; }
    .login-sub   { font-size:12px; color:var(--muted); }
    .field { margin-bottom:18px; }
    .field label { display:block; font-size:11px; font-weight:600; color:var(--muted);
                   text-transform:uppercase; letter-spacing:.06em; margin-bottom:6px; }
    .field input {
      width:100%; background:var(--surface2); border:1px solid var(--border);
      color:var(--text); border-radius:8px; padding:11px 14px; font-size:13px;
      outline:none; transition:border-color .15s;
    }
    .field input:focus { border-color:var(--purple); }
    .login-btn {
      width:100%; background:var(--purple); color:#fff; border:none;
      border-radius:8px; padding:12px; font-size:14px; font-weight:700;
      cursor:pointer; margin-top:4px; transition:opacity .15s;
    }
    .login-btn:hover { opacity:.88; }
    .login-btn:disabled { opacity:.5; cursor:not-allowed; }
    .err-box {
      background:rgba(239,68,68,.1); border:1px solid rgba(239,68,68,.3);
      color:#f87171; border-radius:8px; padding:10px 14px;
      font-size:12px; margin-top:16px; display:none;
    }
  </style>
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.14 13a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.05 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 21 17z"/>
        </svg>
      </div>
      <div class="login-title">AI Predictive Dialer</div>
      <div class="login-sub">Sign in to continue</div>
    </div>

    <form id="login-form">
      <div class="field">
        <label>Username</label>
        <input id="username" type="text" autocomplete="username" placeholder="Enter username" required/>
      </div>
      <div class="field">
        <label>Password</label>
        <input id="password" type="password" autocomplete="current-password" placeholder="Enter password" required/>
      </div>
      <button id="login-btn" class="login-btn" type="submit">Sign In</button>
      <div id="err-box" class="err-box"></div>
    </form>
  </div>
</div>
<script src="/static/login.js"></script>
</body>
</html>
